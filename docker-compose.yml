services:
  weibo-crawler:
    build:
      context: .
      args:
        APT_HTTP_PROXY: ${APT_HTTP_PROXY:-}
        APT_HTTPS_PROXY: ${APT_HTTPS_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: weibo-crawler
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./weibo_data:/app/weibo_data
    command: ["python", "main.py", "--config", "config.yaml", "--mode", "daemon"]
