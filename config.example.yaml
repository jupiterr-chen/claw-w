auth:
  cookie: "请填写微博登录 Cookie"

targets:
  user_ids:
    - "1644724561"
  since_date: "2026-03-12"
  include_retweets: false

download:
  images: true
  image_timeout: 15

storage:
  # 默认存储目录（可通过 CLI --base-dir 临时覆盖）
  base_dir: "./weibo_data"
  db_path: "./weibo_data/history.db"

network:
  delay_min: 3
  delay_max: 8
  timeout: 10
  max_retries: 3
  user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1"

logging:
  level: "INFO"
  file: "./weibo_data/logs/weibo_crawler.log"
  console: true

ocr:
  enabled: false
  # tesseract | paddle
  engine: "tesseract"
  lang: "chi_sim+eng"
  use_gpu: false
  # reprocess-ocr 模式下是否重新下载图片；false=仅对本地已下载图片做 OCR
  reprocess_download_images: true
  # 相对 base_dir 的 JSONL 输出（Raw 层）
  output_jsonl: "raw/ocr.jsonl"

task:
  run_mode: "once"   # once|daemon
  run_at: "00:05"    # daemon 模式下每天执行时间
  run_full_ocr_after: false  # 每轮抓取完成后追加一次全量 OCR（reprocess-ocr）
